<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plataforma de Gestão — Confiance Medical</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Raleway:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Raleway', sans-serif;
  background: linear-gradient(160deg, #e8f4f8 0%, #d0e8f0 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}
/* Logo */
.logo-wrap {
  margin-bottom: 40px;
}
.logo-wrap img {
  height: 60px;
  display: block;
}
/* Título */
h1 {
  font-family: 'Montserrat', sans-serif;
  font-size: 32px; font-weight: 800;
  color: #1F2C4E;
  margin-bottom: 8px;
  text-align: center;
}
.subtitle {
  font-size: 15px; color: #64748b;
  margin-bottom: 52px;
  text-align: center;
}
/* Card de módulo */
.module-card {
  width: 300px;
  border-radius: 18px;
  overflow: hidden;
  background: #fff;
  box-shadow: 0 4px 28px rgba(31,44,78,.12);
  cursor: pointer;
  text-decoration: none;
  transition: transform .18s ease, box-shadow .18s ease;
  display: flex;
  flex-direction: column;
}
.module-card:hover {
  transform: translateY(-8px);
  box-shadow: 0 16px 40px rgba(31,44,78,.20);
}
.card-banner {
  height: 170px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #1F2C4E 0%, #326A84 60%, #64C3D1 100%);
}
.banner-icon {
  width: 76px; height: 76px;
  background: rgba(255,255,255,.18);
  border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}
.banner-icon svg { width: 40px; height: 40px; stroke: #fff; fill: none; stroke-width: 1.5; }
.card-body { padding: 24px 24px 28px; }
.card-body h2 {
  font-family: 'Montserrat', sans-serif;
  font-size: 19px; font-weight: 700;
  color: #1F2C4E;
  margin-bottom: 8px;
}
.card-body p {
  font-size: 13px; color: #64748b;
  line-height: 1.65;
}
.card-footer {
  padding: 0 24px 20px;
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 600;
  color: #326A84;
}
.card-footer svg { width: 14px; height: 14px; stroke: #64C3D1; }
</style>
</head>
<body>

<!-- Logo -->
<div class="logo-wrap">
  <img src="https://confiancemedical.com.br/wp-content/uploads/2024/07/logo-confiance.png" alt="Confiance Medical">
</div>

<h1>Plataforma de Gestão</h1>
<p class="subtitle">Selecione o módulo que deseja acessar</p>

<!-- Pedidos - PCP -->
<a class="module-card" href="/pcp">
  <div class="card-banner">
    <div class="banner-icon">
      <svg viewBox="0 0 24 24">
        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
        <line x1="8" y1="21" x2="16" y2="21"></line>
        <line x1="12" y1="17" x2="12" y2="21"></line>
      </svg>
    </div>
  </div>
  <div class="card-body">
    <h2>Pedidos - PCP</h2>
    <p>Acompanhamento de produção, indicadores de desempenho e eficiência operacional.</p>
  </div>
  <div class="card-footer">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
    Acessar módulo
  </div>
</a>

</body>
</html>
